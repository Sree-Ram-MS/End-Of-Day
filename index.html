<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>End-of-Day Closing Procedure</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a1628;
      color: #c8d8f0;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* ─── HERO ─────────────────────────────── */
    .hero {
      text-align: center;
      padding: 52px 24px 18px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(56, 139, 253, 0.08);
      border: 1px solid rgba(56, 139, 253, 0.2);
      color: #7dbeff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 22px;
      text-transform: uppercase;
    }

    .hero h1 {
      font-family: 'Josefin Sans', sans-serif;
      font-size: clamp(2rem, 5.5vw, 3.2rem);
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
    }

    .accent {
      background: linear-gradient(135deg, #388bfd, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ─── PROGRESS CARD ─────────────────────── */
    .progress-card-container {
      max-width: 860px;
      margin: 14px auto 38px;
      padding: 0 18px; /* FIX: Added side padding to match step cards */
    }

    .progress-card {
      background: #0f1f38;
      border: 1px solid #1a3560;
      border-radius: 18px;
      padding: 26px 28px 22px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 18px;
    }

    .date-group .date {
      font-size: 0.78rem;
      color: #4a6fa0;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .date-group .clock {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: #fff;
    }

    .status-group { text-align: right; }
    .status-group .label { font-size: 0.78rem; color: #4a6fa0; margin-bottom: 4px; }
    .pct { font-family: 'Josefin Sans', sans-serif; font-size: 1.7rem; font-weight: 800; color: #fff; }

    .bar-wrap { height: 6px; background: #0a1628; border-radius: 10px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #388bfd, #c084fc); width: 0%; transition: width 0.45s ease; }

    /* ─── THANK YOU BANNER ─── */
    #thanks-banner {
      display: none;
      text-align: center;
      background: linear-gradient(135deg, #388bfd, #c084fc);
      color: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 700;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    /* ─── STEPS LIST ────────────────────────── */
    .steps-wrap { max-width: 860px; margin: 0 auto; padding: 0 18px; display: flex; flex-direction: column; gap: 16px; }

    .step-card {
      background: #0f1f38;
      border: 1px solid #1a3560;
      border-radius: 16px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      cursor: pointer; /* Makes whole card feel interactive */
      transition: background 0.2s;
    }

    .step-card:hover { background: #132644; }
    .step-card.done { opacity: 0.45; border-color: #1e5c35; background: #0c1f16; }

    .step-card-header { display: flex; align-items: center; gap: 14px; }
    .cb {
      width: 28px; height: 28px; border: 2px solid #243d6a; border-radius: 8px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    .step-card.done .cb { background: #27ae60; border-color: #27ae60; }
    .cb svg { display: none; }
    .step-card.done .cb svg { display: block; }

    .step-num { font-family: 'Josefin Sans', sans-serif; font-size: 0.7rem; color: #388bfd; text-transform: uppercase; margin-bottom: 4px; }
    .step-title { font-family: 'Josefin Sans', sans-serif; font-size: 1.05rem; font-weight: 700; color: #e8f0ff; }

    .step-body { display: flex; justify-content: space-between; gap: 16px; padding-left: 42px; }
    .step-info { flex: 1; pointer-events: none; } /* Text won't block the card click */
    .step-desc { font-size: 0.92rem; color: #6a8bb8; line-height: 1.65; }

    /* ─── IMAGE THUMBNAIL ─── */
    .img-wrap {
      width: 120px; height: 90px; flex-shrink: 0; border-radius: 10px; overflow: hidden;
      cursor: zoom-in; border: 1px solid #1a3560;
      position: relative; z-index: 10; /* Ensures image click works separate from card click */
    }
    .img-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ─── LIGHTBOX ─── */
    .img-zoom {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(5, 12, 25, 0.96); backdrop-filter: blur(10px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .img-zoom.active { display: flex; }
    .img-zoom img { max-width: 95%; max-height: 85vh; border-radius: 12px; }
    .zoom-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 2rem; cursor: pointer; }

    /* ─── MOBILE FIXES ─────────────────────── */
    @media (max-width: 600px) {
      .progress-top { flex-direction: column; align-items: center; text-align: center; gap: 12px; }
      .status-group { text-align: center; }
      .step-body { flex-direction: column; padding-left: 0; align-items: center; text-align: center; }
      .img-wrap { width: 100%; height: 180px; }
    }
  </style>
</head>

<body>

  <div class="hero">
    <div class="hero-badge">&#9679; Office Operations</div>
    <h1>End-of-Day <span class="accent">Closing</span><br>Procedure</h1>
  </div>

  <div class="progress-card-container">
    <div id="thanks-banner">🎉 THANK YOU!.</div>
    <div class="progress-card">
      <div class="progress-top">
        <div class="date-group">
          <div class="date" id="cur-date"></div>
          <div class="clock" id="cur-clock">--:-- --</div>
        </div>
        <div class="status-group">
          <div class="label" id="prog-text">0 of 10 completed</div>
          <div class="pct" id="pct-val">0%</div>
        </div>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill" id="bar"></div>
      </div>
    </div>
  </div>

  <div class="steps-wrap" id="steps-container">
    </div>

  <div class="img-zoom" id="zoom-overlay" onclick="closeZoom()">
    <span class="zoom-close">&times;</span>
    <img id="zoom-img" src="">
  </div>

  <script>
    const stepsData = [
      { title: "Climate Control — AC Off", desc: "Switch OFF the AC using the remote and wait until the air ventilator closes.", img: "img/1.jpg" },
      { title: "Distribution Board (DB)", desc: "Go to the main DB area and gently push the door to open.", img: "img/2.jpg" },
      { title: "Master Switches", desc: "Turn OFF all light switches and the AC master switch inside the DB.", img: "img/3.jpg" },
      { title: "Washroom Check", desc: "Verify that washroom lights and the exhaust fan are switched OFF.", img: "img/4.jpg" },
      { title: "Lock All Doors", desc: "Lock all doors using a Key or the Biometric system.", img: "img/5.jpg" },
      { title: "Stairway & Ground Floor", desc: "Switch OFF all stairway and ground-floor lights (Keep front 3 bulbs ON).", img: "img/6.jpg" },
      { title: "Kitchen Check", desc: "Ensure kitchen lights and fan are switched OFF.", img: "img/7.jpg" },
      { title: "External Shutters", desc: "Close all shutters using the provided iron rods.", img: "img/8.jpg" },
      { title: "Main Gate", desc: "Close the main gate securely.", img: "img/9.jpg" },
      { title: "Secure Perimeter", desc: "Secure the area with the chain and hand over keys to HQ Security.", img: "img/10.jpg" }
    ];

    const done = new Set();
    const container = document.getElementById('steps-container');

    // Render Steps
    stepsData.forEach((s, i) => {
      const n = i + 1;
      const card = document.createElement('div');
      card.className = 'step-card';
      card.id = `step-${n}`;
      // FIX: Clicking the card toggles the step
      card.onclick = () => toggleStep(n);

      card.innerHTML = `
        <div class="step-card-header">
          <div class="cb">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="step-meta">
            <div class="step-num">Step ${n.toString().padStart(2, '0')}</div>
            <div class="step-title">${s.title}</div>
          </div>
        </div>
        <div class="step-body">
          <div class="step-info"><div class="step-desc">${s.desc}</div></div>
          ${s.img ? `
            <div class="img-wrap" onclick="event.stopPropagation(); openZoom('${s.img}')">
              <img class="img-thumb" src="${s.img}">
            </div>` : ''}
        </div>
      `;
      container.appendChild(card);
    });

    function toggleStep(n) {
      const card = document.getElementById(`step-${n}`);
      if (done.has(n)) { done.delete(n); card.classList.remove('done'); }
      else { done.add(n); card.classList.add('done'); }
      updateProgress();
    }

    function updateProgress() {
      const pct = Math.round((done.size / stepsData.length) * 100);
      document.getElementById('bar').style.width = pct + '%';
      document.getElementById('pct-val').textContent = pct + '%';
      document.getElementById('prog-text').textContent = `${done.size} of ${stepsData.length} completed`;
      
      // SHOW THANK YOU BANNER AT 100%
      const banner = document.getElementById('thanks-banner');
      banner.style.display = (pct === 100) ? 'block' : 'none';
    }

    function openZoom(src) {
      document.getElementById('zoom-img').src = src;
      document.getElementById('zoom-overlay').classList.add('active');
    }

    function closeZoom() {
      document.getElementById('zoom-overlay').classList.remove('active');
    }

    function tick() {
      const now = new Date();
      document.getElementById('cur-clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('cur-date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    }
    setInterval(tick, 1000); tick();
  </script>
</body>
</html>
